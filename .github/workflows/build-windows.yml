name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Google Chrome
      run: |
        winget install Google.Chrome --accept-source-agreements --accept-package-agreements

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller selenium webdriver-manager pandas openpyxl requests

    - name: Determine Selenium path
      id: selenium
      run: |
        python -c "import selenium, os; print(os.path.dirname(selenium.__file__))" > selenium_path.txt

    - name: Build EXE with Selenium included
      run: |
        $seleniumPath = Get-Content selenium_path.txt
        pyinstaller waarnemingnestenperprovincie.pyw --onedir --windowed --name AHnestenprovincie --icon=AziatischeHoornaar.ico --add-data "$seleniumPath;selenium"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AHnestenprovincie
        path: dist/AHnestenprovincie
